<!DOCTYPE html>
<html lang="en" style="height: 100%">
<head>
  <meta charset="utf-8">
  <style>
    .tip {
      font-size: 12px;
      color: #8A8A8A;
    }
    
    .tip a {
      color: #333;
    }
    
    .tip span {
      color: #333;
      weight: 400;
    }

  </style>
</head>
<body style="height: 80%; margin: 50px;">
  
  <div id="container" style="height: 100%"></div>
  
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  
  <!-- Uncomment this line if you want to dataTool extension
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/extension/dataTool.min.js"></script>
  -->
  <!-- Uncomment this line if you want to use gl extension
  <script type="text/javascript" src="https://echarts.apache.org/en/js/vendors/echarts-gl/dist/echarts-gl.min.js"></script>
  -->
  <!-- Uncomment this line if you want to echarts-stat extension
  <script type="text/javascript" src="https://echarts.apache.org/en/js/vendors/echarts-stat/dist/ecStat.min.js"></script>
  -->
  <!-- Uncomment this line if you want to echarts-graph-modularity extension
  <script type="text/javascript" src="https://echarts.apache.org/en/js/vendors/echarts-graph-modularity/dist/echarts-graph-modularity.min.js"></script>
  -->
  <!-- Uncomment this line if you want to use map
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@4.9.0/map/js/world.js"></script>
  -->
  <!-- Uncomment these two lines if you want to use bmap extension
  <script type="text/javascript" src="https://api.map.baidu.com/api?v=3.0&ak=YOUR_API_KEY"></script>
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/extension/bmap.min.js"></script>
  -->

  <script type="text/javascript">
    var dom = document.getElementById('container');
    var myChart = echarts.init(dom, null, {
      renderer: 'canvas',
      useDirtyRect: false
    });
    var app = {};
    
    var option;
    
    function formatTime(ms) {
      if (ms >= 1000) return (ms / 1000).toFixed(2) + ' s';
      return ms + ' ms';
    }
    
    function formatMemory(kb) {
      if (kb >= 1024 * 1024) return (kb / 1024 / 1024).toFixed(2) + ' GB';
      if (kb >= 1024) return (kb / 1024).toFixed(2) + ' MB';
      return kb + ' KB';
    }
    
    function createSeries(lang, x, y, link, extra = {}) {
      return {
        name: lang,
        type: 'scatter',
        symbolSize: 12,
        data: [
          Object.assign(
            {
              value: [x, y],
              lang: lang,
              cpu: x,
              mem: y,
              code: github + link
            },
            extra || {}
          )
        ],
        label: {
          show: true,
          formatter: (p) => p.data.lang,
          position: 'top',
          color: '#333'
        }
      };
    }
    
    const github = 'https://github.com/kiwionly/performance-test/blob/main/';
    
    option = {
      legend: {
        show: true,
        itemGap: 25
      },
    
      tooltip: {
        trigger: 'item',
        enterable: true,
        hideDelay: 333,
        formatter: function (p) {
          const d = p.data || {};
    
          let html = `<div class="tip">
              <a href="${d.code}" target="_blank">${d.lang}</a>
              <br/>
              <span>Used:</span> ${formatTime(d.cpu)}
              <br/>
              <span>Mem:</span> ${formatMemory(d.mem)}
        `;
    
          const exclude = ['lang', 'cpu', 'mem', 'value', 'code'];
    
          Object.keys(d).forEach((key) => {
            if (!exclude.includes(key)) {
              const val = d[key];
              html += `<br/><span>${key}:</span> ${val}`;
            }
          });
          
          html += `</div>`;
    
          return html;
        }
      },
    
      xAxis: {
        type: 'log',
        name: 'CPU Time (ms)',
        max: 5000,
        splitLine: { lineStyle: { opacity: 0.0 } }
      },
    
      yAxis: {
        type: 'value',
        name: 'Max RSS',
        axisLabel: {
          formatter: (v) => formatMemory(v)
        },
        splitLine: { lineStyle: { opacity: 0.3 } }
      },
    
      series: [
        createSeries('Asm ', 70, 128, '/asm/avx2_read.asm', {
          'CPU Cycle': 45,
          'Features': 'avx2, rdtsc, cpuid'
        }),
        createSeries('C', 40, 1664, 'c/read.c'),
        createSeries('Go', 90, 2944, 'go/read.go', {
          'CPU Cycle': 54,
          'Features': 'loop unrolling'
        }),
        createSeries('Zig', 90, 128, 'zig/read.zig'),
        createSeries('Rust', 90, 1920, 'rust/src/main.rs'),
    
        createSeries('Java System-style', 234, 105824, 'java/Read.java'),
        createSeries('Java System-style - Native Image', 167, 9728, 'java/Read.java'),
        createSeries('Java', 484, 228804, 'java/SlowRead.java'),
        createSeries('Java - Native Image', 646, 59692, 'java/SlowRead.java'),
    
        createSeries('Python', 4600, 10368, 'python/read.py')
      ]
    };

    if (option && typeof option === 'object') {
      myChart.setOption(option);
    }

    window.addEventListener('resize', myChart.resize);
  </script>
</body>
</html>
