<!DOCTYPE html>
<html lang="en" style="height: 100%">
<head>
  <meta charset="utf-8">
  <style>
    .tip {
	  font-size: 12px;
	  color: #8A8A8A;
	}

	.tip a {
	  color: #333;
	}

	.tip span {
	  color: #333;
	  weight: 400;
	}
	
	.hint {
		margin-top: 20px;
		text-align: center;
		font-family: 'system-ui';
		font-size : 14px;
		color: #808080;
	}
  </style>
</head>
<body style="height: 80%; margin-top: 20px;">
  <div id="container" style="height: 100%"></div>

  <div class="hint">Click the legend to show or hide languages.</div>

  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  
  <script type="text/javascript">
    var dom = document.getElementById('container');
    var myChart = echarts.init(dom, null, {
      renderer: 'canvas',
      useDirtyRect: false
    });
    var app = {};
        
	function formatTime(ms) {
	  if (ms >= 1000) return (ms / 1000).toFixed(2) + ' s';
	  return ms + ' ms';
	}

	function formatMemory(kb) {
	  if (kb >= 1024 * 1024) return (kb / 1024 / 1024).toFixed(2) + ' GB';
	  if (kb >= 1024) return (kb / 1024).toFixed(2) + ' MB';
	  return kb + ' KB';
	}

	function createSeries(lang, x, y, link, extra = {}) {
	  return {
		name: lang,
		type: 'scatter',
		symbolSize: 20,
		data: [
		  Object.assign(
			{
			  value: [x, y],
			  lang: lang,
			  cpu: x,
			  mem: y,
			  code: github + link
			},
			extra || {}
		  )
		],
		label: {
		  show: true,
		  formatter: (p) => p.data.lang,
		  position: 'top',
		  color: '#333'
		}
	  };
	}

	const github = 'https://github.com/kiwionly/performance-test/blob/main/';

	var option = {
	
	  title: {
		text: 'Performance Benchmark for 4 Million Records',
		subtext: 'CPU Time vs Memory Usage',
		subtextStyle: { color: '#808080' },
		left: 'center'
	  },
	  
	  legend: {
		show: true,
		bottom: 0,
		itemGap: 25
	  },
	  
	  grid: {
		bottom: 75
	  },

	  tooltip: {
		trigger: 'item',
		enterable: true,
		hideDelay: 333,
		formatter: function (p) {
		  const d = p.data || {};

		  let html = `<div class="tip">
			  <a href="${d.code}" target="_blank">${d.lang}</a>
			  <br/>
			  <span>Used:</span> ${formatTime(d.cpu)}
			  <br/>
			  <span>Mem:</span> ${formatMemory(d.mem)}
		`;

		  const exclude = ['lang', 'cpu', 'mem', 'value', 'code'];

		  Object.keys(d).forEach((key) => {
			if (!exclude.includes(key)) {
			  const val = d[key];
			  html += `<br/><span>${key}:</span> ${val}`;
			}
		  });
		  
		  html += `</div>`;

		  return html;
		}
	  },

	  xAxis: {
		type: 'value',
		name: 'CPU Time (ms)',
		splitLine: { lineStyle: { opacity: 0.0 } }
	  },

	  yAxis: {
		type: 'value',
		name: 'Max RSS',
		axisLabel: {
		  formatter: (v) => formatMemory(v)
		},
		splitLine: { lineStyle: { opacity: 0.6 } }
	  },

	  series: [
		createSeries('C', 40, 1664, 'c/read.c'),
		createSeries('Asm - avx2', 70, 128, '/asm/avx2_read.asm', {
		  'CPU Cycle': 45,
		  'Features': 'avx2, rdtsc, cpuid'
		}),		
		createSeries('Zig', 90, 128, 'zig/read.zig'),
		createSeries('Rust', 90, 1920, 'rust/src/main.rs'),
		createSeries('Go', 90, 2944, 'go/read.go', {
		  'CPU Cycle': 54,
		  'Features': 'loop unrolling rdtsc, cpuid'
		}),
		createSeries('Asm', 150, 128, '/asm/read.asm', {
		  'CPU Cycle': 91,
		  'Features': 'rdtsc, cpuid'
		}),

		createSeries('Java System-style - Native Image', 161, 9216, 'java/Read.java'),		  
		createSeries('Java System-style', 234, 105824, 'java/Read.java'),		  
		createSeries('Java - Native Image', 643, 59308, 'java/SlowRead.java'),
		createSeries('Java', 484, 228804, 'java/SlowRead.java'),

		createSeries('Python', 4600, 10368, 'python/read.py')
	  ]
	};

    if (option && typeof option === 'object') {
      myChart.setOption(option);
    }

    window.addEventListener('resize', myChart.resize);
  </script>
</body>
</html>
